<script>
async function gen() {
  let topic = document.getElementById("topic").value;

  if(topic.trim() === ""){
    document.getElementById("out").innerHTML = "Enter topic first";
    return;
  }

  document.getElementById("out").innerHTML = "Generating...";

  let res = await fetch("http://localhost:3000/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ topic })
  });

  let data = await res.json();
  document.getElementById("out").innerHTML = data.result;
}
</script>
