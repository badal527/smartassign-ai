<!DOCTYPE html>
<html>
<head>
<title>SmartAssign AI Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(-45deg,#0f172a,#1e293b,#020617,#0f172a);
  background-size: 400% 400%;
  animation: gradient 8s ease infinite;
  color:white;
  text-align:center;
}

@keyframes gradient{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.container{
  margin-top:80px;
}

.box{
  background: rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter: blur(10px);
  width:90%;
  max-width:500px;
  margin:auto;
}

input{
  padding:12px;
  width:80%;
  border-radius:10px;
  border:none;
  margin:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

#out{
  margin-top:20px;
  text-align:left;
  white-space: pre-line;
}

.loader{
  border:4px solid #333;
  border-top:4px solid #22c55e;
  border-radius:50%;
  width:30px;
  height:30px;
  animation: spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  0%{transform:rotate(0);}
  100%{transform:rotate(360deg);}
}
</style>

</head>

<body>

<div class="container">
<h1>🤖 SmartAssign AI</h1>

<div class="box">

<input id="topic" placeholder="Enter topic">
<br>
<button onclick="gen()">Generate</button>

<div id="out"></div>

</div>
</div>

<script>
async function gen() {
  let topic = document.getElementById("topic").value;

  if(topic.trim() === ""){
    document.getElementById("out").innerHTML = "Enter topic first";
    return;
  }

  document.getElementById("out").innerHTML = '<div class="loader"></div>';

  let res = await fetch("https://ai-server-tfpt.onrender.com/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ topic })
  });

  let data = await res.json();

  typeEffect(data.result);
}

function typeEffect(text){
  let i=0;
  let speed=20;
  let out=document.getElementById("out");
  out.innerHTML="";

  function typing(){
    if(i<text.length){
      out.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing,speed);
    }
  }
  typing();
}
</script>

</body>
</html>
