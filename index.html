<script>
async function gen() {
  let topic = document.getElementById("topic").value;

  if (!topic || topic.trim() === "") {
    document.getElementById("out").innerHTML = "Enter topic first";
    return;
  }

  document.getElementById("out").innerHTML = "⏳ Loading AI...";

  try {
    let res = await fetch("https://ai-server-tfpt.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ topic })
    });

    let data = await res.json();

    if (data.result) {
      document.getElementById("out").innerHTML = data.result;
    } else {
      document.getElementById("out").innerHTML = "AI not responding";
    }

  } catch (err) {
    document.getElementById("out").innerHTML = "Server error";
  }
}
</script>
