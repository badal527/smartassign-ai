<script>
async function gen() {
  let topic = document.getElementById("topic").value;

  if(topic.trim() === ""){
    document.getElementById("out").innerHTML = "Enter topic first";
    return;
  }

  document.getElementById("out").innerHTML = "⏳ Generating AI response...";

  try {
    let res = await fetch("https://ai-server-tfpt.onrender.com/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ topic })
    });

    let data = await res.json();

    if(data.result){
      typeEffect(data.result);
    } else {
      document.getElementById("out").innerHTML = "❌ AI not responding";
    }

  } catch (e) {
    document.getElementById("out").innerHTML = "❌ Server error / Render sleeping";
  }
}
</script>
